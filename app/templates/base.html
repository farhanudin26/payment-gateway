<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Payment Gateway{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://app.sandbox.midtrans.com/snap/snap.js" 
            data-client-key="{{ config.MIDTRANS_CLIENT_KEY }}"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-white shadow-sm border-b">
        <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
            <span class="font-semibold text-gray-800">💳 Payment Gateway</span>
            <div class="flex gap-4 text-sm">
                <a href="/" class="text-gray-600 hover:text-blue-600">Home</a>
                <a href="/transaksi" class="text-gray-600 hover:text-blue-600">Riwayat</a>
            </div>
        </div>
    </nav>
    <main class="max-w-4xl mx-auto px-4 py-8">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
            <div class="mb-4 p-3 rounded text-sm
                {% if category == 'success' %}bg-green-100 text-green-800
                {% elif category == 'error' %}bg-red-100 text-red-800
                {% else %}bg-blue-100 text-blue-800{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
